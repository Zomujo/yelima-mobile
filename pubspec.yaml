name: yelima
description: A production-grade Flutter project generated via Universal Architecture.
publish_to: "none"
version: 1.0.0+4

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management

  provider: ^6.1.2
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.8.1

  # Network & API
  dio: ^5.9.2

  # Services & Utils

  shared_preferences: ^2.3.4

  flutter_dotenv: ^5.2.1

  path_provider: ^2.1.5
  path: ^1.9.0
  logger: ^2.6.2
  fpdart: ^1.1.0
  flutter_animate: ^4.5.2
  connectivity_plus: ^6.1.3
  url_launcher: ^6.3.1

  # Local Database

  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Auth & Cloud

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0

  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^18.0.1

  web_socket_channel: ^3.0.3
  iconsax: ^0.0.8
  flutter_svg: ^2.2.0
  fl_chart: ^0.71.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  equatable: ^2.0.8
  cloud_firestore: ^6.6.0
  internet_connection_checker_plus: ^3.1.0
  intl: ^0.20.2
  audio_waveforms:
    git: https://github.com/Mawuli-360/audio_waveforms.git
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.7+1
  uuid: ^4.5.3
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14

  drift_dev: ^2.23.1
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0
  freezed: ^3.0.6
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.dev
    - .env.prod

    - assets/icons/
    - assets/images/
    - assets/images/avatars/
    - assets/fonts/

  # fonts:
  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/fonts/product-sans/regular.ttf
        - asset: assets/fonts/product-sans/medium.ttf
        - asset: assets/fonts/product-sans/italic.ttf
        - asset: assets/fonts/product-sans/bold.ttf
        - asset: assets/fonts/product-sans/bold-italic.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/noto/NotoSans-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_icon.png"

flutter_native_splash:
  color: "#FAF9F6"
  image: "assets/images/logo_png.png"
  android: true
  ios: true
